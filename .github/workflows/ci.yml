name: CI

on:
  push:
    branches: [main, feature/cadcalib]
  pull_request:
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/gmmcalib
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build_image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_ref: ${{ steps.meta.outputs.image_ref }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image ref
        id: meta
        run: echo "image_ref=${IMAGE_NAME}:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: |
          docker build \
            -f docker/Dockerfile \
            -t "${{ steps.meta.outputs.image_ref }}" \
            .

      - name: Push image
        if: github.event_name != 'pull_request'
        run: docker push "${{ steps.meta.outputs.image_ref }}"

  test:
    runs-on: ubuntu-latest
    needs: build_image
    permissions:
      contents: read
      packages: read
    env:
      RERUN: "OFF"
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: gmmcalib
            script: python src/gmmcalib.py
          - name: cadcalib-sim-single-chair
            script: bash scripts/run_cad_calib.sh
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image locally for PRs
        if: github.event_name == 'pull_request'
        run: |
          docker build \
            -f docker/Dockerfile \
            -t "${{ needs.build_image.outputs.image_ref }}" \
            .

      - name: Pull image for push/workflow_dispatch
        if: github.event_name != 'pull_request'
        run: docker pull "${{ needs.build_image.outputs.image_ref }}"

      - name: Run ${{ matrix.name }}
        run: |
          docker run --rm \
            -e RERUN="${RERUN}" \
            -v "$PWD:/workspace" \
            -w /workspace \
            "${{ needs.build_image.outputs.image_ref }}" \
            /bin/bash -lc "${{ matrix.script }}"

      - name: Upload metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: metrics-${{ matrix.name }}
          path: metrics.txt
          if-no-files-found: ignore